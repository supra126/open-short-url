# ============================================================
# Open Short URL - Docker Compose (VPS 一鍵部署)
# ============================================================
# Usage:
#   1. Download this file and .env.docker.example
#   2. cp .env.docker.example .env.docker
#   3. Edit .env.docker with your settings
#   4. docker compose up -d
#
# With built-in SSL (auto Let's Encrypt via Caddy):
#   docker compose --profile ssl up -d
#
# Images are pulled from GHCR. Pin a version with:
#   IMAGE_TAG=v1.0.0 docker compose up -d
# ============================================================

services:
  # --- PostgreSQL ---
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-open_short_url}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres}']
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Redis ---
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      sh -c '
        if [ -n "$REDIS_PASSWORD" ]; then
          redis-server --requirepass "$REDIS_PASSWORD"
        else
          redis-server
        fi
      '
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    ports:
      - '${REDIS_PORT:-6379}:6379'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'redis-cli ${REDIS_PASSWORD:+-a "$REDIS_PASSWORD"} ping | grep -q PONG',
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- MinIO (S3-compatible storage) ---
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - '${MINIO_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_PORT:-9001}:9001'
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Backend (NestJS) ---
  backend:
    image: ghcr.io/supra126/open-short-url-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - path: .env.docker
        required: false
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 4101
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-open_short_url}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      ADMIN_INITIAL_PASSWORD: ${ADMIN_INITIAL_PASSWORD:-admin123}
      SHORT_URL_DOMAIN: ${SHORT_URL_DOMAIN:-http://localhost:4101}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:4100}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:4100}
      TRUSTED_PROXY: ${TRUSTED_PROXY:-true}
      # S3 Storage (for OG image upload)
      S3_REGION: ${S3_REGION:-auto}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-open-short-url}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-}
      S3_GLOBAL_PREFIX: ${S3_GLOBAL_PREFIX:-}
    ports:
      - '${BACKEND_PORT:-4101}:4101'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # --- Frontend (Next.js) ---
  frontend:
    image: ghcr.io/supra126/open-short-url-frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4101}
      NEXT_PUBLIC_SHORT_URL_DOMAIN: ${NEXT_PUBLIC_SHORT_URL_DOMAIN:-http://localhost:4101}
      NEXT_PUBLIC_LOCALE: ${NEXT_PUBLIC_LOCALE:-en}
      NEXT_PUBLIC_BRAND_NAME: ${NEXT_PUBLIC_BRAND_NAME:-Open Short URL}
      NEXT_PUBLIC_BRAND_ICON_URL: ${NEXT_PUBLIC_BRAND_ICON_URL:-}
      NEXT_PUBLIC_BRAND_DESCRIPTION: ${NEXT_PUBLIC_BRAND_DESCRIPTION:-}
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_TURNSTILE_SITE_KEY:-}
      NEXT_PUBLIC_DOCS_URL: ${NEXT_PUBLIC_DOCS_URL:-https://supra126.github.io/open-short-url/}
    ports:
      - '${FRONTEND_PORT:-4100}:4100'
    depends_on:
      - backend

  # --- MCP Server (Model Context Protocol) ---
  # Optional: Enable AI assistant integration
  # Requires an API key from the backend
  mcp:
    image: ghcr.io/supra126/open-short-url-mcp:${IMAGE_TAG:-latest}
    profiles: ['mcp']
    restart: unless-stopped
    environment:
      API_URL: http://backend:4101
      API_KEY: ${MCP_API_KEY:-}
      MCP_TRANSPORT: http
      MCP_PORT: 3200
      MCP_HOST: 0.0.0.0
    ports:
      - '${MCP_PORT:-3200}:3200'
    depends_on:
      - backend

  # --- Caddy (SSL reverse proxy) ---
  # Activate with: docker compose --profile ssl up -d
  caddy:
    image: caddy:2-alpine
    profiles: ['ssl']
    restart: unless-stopped
    environment:
      SHORT_URL_DOMAIN: ${SHORT_URL_DOMAIN:-http://localhost:4101}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:4100}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - '80:80'
      - '443:443'
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  redis_data:
  minio_data:
  caddy_data:
  caddy_config:
