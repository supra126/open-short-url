# ============================================================
# Open Short URL - Railway Configuration
# ============================================================
# This file configures the backend service for Railway CLI.
# For one-click deploy, use the Deploy button in README.
# ============================================================

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/backend/Dockerfile"

[deploy]
healthcheckPath = "/api"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
